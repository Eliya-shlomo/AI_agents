apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: production
  labels:
    app: payment-service
    version: "1.2.3"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: python:3.11-slim
        command: ["python", "-c"]
        args:
          - |
            import time, os, sys
            print("Starting payment-service...")
            mem_limit = int(os.environ.get('MEMORY_LIMIT', '100'))
            crash_after = int(os.environ.get('CRASH_AFTER_SECONDS', '30'))
            print(f"Will crash after {crash_after} seconds")
            start = time.time()
            leak = []
            while True:
                elapsed = time.time() - start
                if elapsed > crash_after:
                    print("FATAL: Database connection timeout after 30s", file=sys.stderr)
                    print("ERROR: Failed to connect to postgres://db:5432/payments", file=sys.stderr)
                    sys.exit(1)
                leak.append(" " * 1024 * 10)
                time.sleep(0.1)
        env:
        - name: CRASH_AFTER_SECONDS
          value: "20"
        - name: DB_HOST
          value: "postgres://db:5432/payments"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: production
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: production
spec:
  selector:
    app: payment-service
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: production
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 80